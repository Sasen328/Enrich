# ============================================================
#  ProspectSA — Docker Compose
#  Services:
#    db       — PostgreSQL 16
#    app      — Full ProspectSA stack (Node + Python Scout)
#    tunnel   — Cloudflare Tunnel (optional, exposes to public internet)
#
#  Usage:
#    docker compose up --build        # First run (builds image)
#    docker compose up                # Subsequent runs
#    docker compose down              # Stop
#    docker compose down -v           # Stop + wipe database
#    docker compose up tunnel         # Start tunnel for public access
# ============================================================

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-bookworm
    container_name: prospectsa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prospectsa
      POSTGRES_USER: prospectsa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prospectsa_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-create secondary databases on FIRST boot (when the data volume
      # is empty). Currently creates `metabase` for the optional BI service.
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospectsa -d prospectsa"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prospectsa_net

  # ── ProspectSA App (Node API + Python Scout) ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prospectsa_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"    # Main app — open this in browser
      - "8099:8099"    # Python Scout (internal, exposed for debugging)
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://prospectsa:[REDACTED]@db:5432/prospectsa
      API_TOKEN: ${API_TOKEN:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      HUGGING_FACE_API_KEY: ${HUGGING_FACE_API_KEY:-}
      MANUS_API_KEY: ${MANUS_API_KEY:-}
      NEXUS_PREFER_FREE_MODELS: ${NEXUS_PREFER_FREE_MODELS:-true}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-}
      SEARXNG_INSTANCES: ${SEARXNG_INSTANCES:-}
      FREE_SEARCH_USER_AGENT: ${FREE_SEARCH_USER_AGENT:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      APOLLO_CLIENT_ID: ${APOLLO_CLIENT_ID:-}
      APOLLO_CLIENT_SECRET: ${APOLLO_CLIENT_SECRET:-}
      APOLLO_ACCESS_TOKEN: ${APOLLO_ACCESS_TOKEN:-}
      EXPLORIUM_API_KEY: ${EXPLORIUM_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      WAPPALYZER_API_KEY: ${WAPPALYZER_API_KEY:-}
      SCOUT_URL: http://localhost:8099
      NEXUS_PROXY_ENABLED: "false"
      WEBSHARE_PROXY_LIST: ${WEBSHARE_PROXY_LIST:-}
      IPROYAL_USER: ${IPROYAL_USER:-}
      IPROYAL_PASS: ${IPROYAL_PASS:-}
      LUNAPROXY_USER: ${LUNAPROXY_USER:-}
      LUNAPROXY_PASS: ${LUNAPROXY_PASS:-}
      SIMPLYNODE_USER: ${SIMPLYNODE_USER:-}
      SIMPLYNODE_PASS: ${SIMPLYNODE_PASS:-}
      NEXUS_CAPTCHA_ENABLED: "false"
      NOPECHA_API_KEY: ${NOPECHA_API_KEY:-}
      AZCAPTCHA_API_KEY: ${AZCAPTCHA_API_KEY:-}
      CAPMONSTER_API_KEY: ${CAPMONSTER_API_KEY:-}
      DEATHBYCAPTCHA_USER: ${DEATHBYCAPTCHA_USER:-}
      DEATHBYCAPTCHA_PASS: ${DEATHBYCAPTCHA_PASS:-}
      ACTIVEPIECES_URL: ${ACTIVEPIECES_URL:-}
      ACTIVEPIECES_API_KEY: ${ACTIVEPIECES_API_KEY:-}
      ACTIVEPIECES_FLOW_BUILDER: ${ACTIVEPIECES_FLOW_BUILDER:-}
      ACTIVEPIECES_FLOW_LEAD_FACTORY: ${ACTIVEPIECES_FLOW_LEAD_FACTORY:-}
      ACTIVEPIECES_FLOW_MASAAR: ${ACTIVEPIECES_FLOW_MASAAR:-}
      ACTIVEPIECES_FLOW_PROSPENGINE: ${ACTIVEPIECES_FLOW_PROSPENGINE:-}
      ACTIVEPIECES_FLOW_SIGNAL_PUSH: ${ACTIVEPIECES_FLOW_SIGNAL_PUSH:-}
      APIFY_API_KEY: ${APIFY_API_KEY:-}
      SHUTDOWN_GRACE_MS: 15000
    cap_add:
      - SYS_ADMIN
    shm_size: '2gb'
    networks:
      - prospectsa_net
    volumes:
      - agent_sessions:/app/artifacts/api-server/.agent_sessions
      - playwright_cache:/ms-playwright
      # Mount start.sh + migrations so `git pull && docker compose restart app`
      # picks them up without a full image rebuild. Read-only.
      - ./start.sh:/app/start.sh:ro
      - ./lib/db/drizzle:/app/lib/db/drizzle:ro
      - ./seed_data.sql:/app/seed_data.sql:ro

  # ── Metabase (BI / analytics — connects to db) ────────────────────────────
  # Optional. Start with `docker compose --profile bi up -d metabase`
  # Visit http://localhost:3001 to set up. First run takes ~60-90s.
  metabase:
    image: metabase/metabase:latest
    container_name: prospectsa_metabase
    profiles: ["bi"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      # Metabase's own internal DB — kept in the same Postgres but a separate
      # database so it doesn't pollute the app schema. Auto-created on first run.
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: prospectsa
      MB_DB_PASS: ${POSTGRES_PASSWORD:-prospectsa_secret}
      MB_SITE_NAME: ProspectSA Analytics
      MB_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@prospectsa.local}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    networks:
      - prospectsa_net

  # ── Cloudflare Tunnel (optional — exposes localhost:3000 to public internet) ──
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prospectsa_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - prospectsa_net
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
  agent_sessions:
    driver: local
  playwright_cache:
    driver: local
  metabase_data:
    driver: local

networks:
  prospectsa_net:
    driver: bridge
