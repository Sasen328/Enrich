kind = "web"
previewPath = "/"
title = "ProspectSA - Saudi B2B Intelligence"
version = "1.0.0"
id = "artifacts/prospect-sa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23101
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/prospect-sa run dev"

[services.env]
PORT = "23101"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/prospect-sa", "run", "build"]
publicDir = "artifacts/prospect-sa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
