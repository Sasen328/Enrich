version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ..:/workspaces/ProspectSA_Full:cached
      - prospectsa-pnpm-cache:/workspaces/ProspectSA_Full/.pnpm-store
      - prospectsa-node-modules:/workspaces/ProspectSA_Full/node_modules
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://prospectsa:prospectsa_secret@db:5432/prospectsa
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "5173:5173"
      - "8099:8099"
    depends_on:
      - db
    networks:
      - prospectsa_dev
    shm_size: 2gb

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: prospectsa
      POSTGRES_USER: prospectsa
      POSTGRES_PASSWORD: prospectsa_secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospectsa -d prospectsa"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prospectsa_dev

volumes:
  postgres_dev_data:
  prospectsa-pnpm-cache:
  prospectsa-node-modules:

networks:
  prospectsa_dev:
    driver: bridge
